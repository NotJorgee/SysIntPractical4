<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Food Explorer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-body">
    
    <div class="login-container">
        <h2>🍽️ Food Explorer</h2>
        <p>Please log in to manage your favorites.</p>
        
        <input type="text" id="username" placeholder="Username (Admin)">
        <input type="password" id="password" placeholder="Password (admin123)">
        
        <button id="loginBtn">Login</button>
        <p id="loginError" class="error-msg hidden">Invalid username or password.</p>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
